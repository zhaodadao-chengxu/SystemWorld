services:
  - type: web
    name: systemworld-ai-zhaodadao
    runtime: node
    plan: free
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DOUBAO_MODEL
        value: doubao-seed-1-6-vision-250815
      - key: ARK_API_KEY
        sync: false
